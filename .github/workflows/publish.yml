name: publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Playwright image tag, e.g. 1.61.1"
        required: true
        default: "1.61.1"

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            variant: ""
          - browser: firefox
            variant: ""
          - browser: webkit
            variant: ""
          - browser: chrome
            variant: ""
          - browser: msedge
            variant: ""
          - browser: chromium
            variant: min
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          BROWSER: ${{ matrix.browser }}
          VARIANT: ${{ matrix.variant }}
        run: |
          chmod +x scripts/push.sh
          if [[ -n "${VARIANT}" ]]; then
            ./scripts/push.sh "${BROWSER}" "${VERSION}" "${VARIANT}"
          else
            ./scripts/push.sh "${BROWSER}" "${VERSION}"
          fi
