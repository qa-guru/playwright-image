name: publish

on:
  push:
    tags:
      - "v*-noble"
  workflow_dispatch:
    inputs:
      version:
        description: "Playwright image tag, e.g. v1.61.1-noble"
        required: true
        default: "v1.61.1-noble"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PW_PACKAGE="${VERSION#v}"
          PW_PACKAGE="${PW_PACKAGE%-noble}"
          docker buildx build \
            --pull \
            --platform linux/amd64,linux/arm64 \
            --build-arg "PLAYWRIGHT_VERSION=${VERSION}" \
            --build-arg "PLAYWRIGHT_PACKAGE=${PW_PACKAGE}" \
            -t "qaguru/playwright:${VERSION}" \
            --push \
            .
